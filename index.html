<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>이현 | 세이프가드 프로</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f3f4f6; }
        .chat-window { display: none; position: fixed; bottom: 80px; right: 20px; width: 350px; height: 500px; background: white; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); flex-direction: column; overflow: hidden; z-index: 1000; }
        .chat-active { display: flex; }
    </style>
</head>
<body class="flex justify-center items-center min-h-screen p-4">

    <div class="bg-white w-full max-w-md rounded-3xl shadow-2xl overflow-hidden text-center p-8">
        <div class="w-32 h-32 rounded-full mx-auto border-4 border-blue-600 mb-4 bg-gray-200 flex items-center justify-center">
            <i class="fas fa-user text-5xl text-gray-400"></i>
        </div>
        <h1 class="text-2xl font-bold text-gray-800">이현</h1>
        <p class="text-blue-600 font-semibold mb-2">종합보험설계사</p>
        <p class="text-gray-500 text-sm mb-6">"당신의 보상을 지키는 방패 : 세이프가드 프로"</p>
        
        <button onclick="toggleChat()" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold shadow-lg hover:bg-blue-700 transition">
            <i class="fas fa-comment-dots mr-2"></i> 실시간 AI 상담하기
        </button>
    </div>

    <div id="chatWindow" class="chat-window">
        <div class="bg-blue-600 p-4 text-white font-bold flex justify-between items-center">
            <span>보험 전문가 AI 상담</span>
            <button onclick="toggleChat()"><i class="fas fa-times"></i></button>
        </div>
        <div id="chatContent" class="flex-1 p-4 overflow-y-auto bg-gray-50 text-sm space-y-4">
            <div class="bg-blue-100 p-3 rounded-lg text-gray-800">안녕하세요! 보험 설계사 이현을 대신해 상담을 도와드리는 AI입니다.</div>
        </div>
        <div class="p-4 border-t bg-white">
            <input id="userName" type="text" placeholder="성함" class="w-full border p-2 rounded mb-2 text-xs">
            <input id="userPhone" type="text" placeholder="연락처" class="w-full border p-2 rounded mb-2 text-xs">
            <div class="flex gap-2">
                <input id="chatInput" type="text" placeholder="질문을 입력하세요..." class="flex-1 border p-2 rounded text-xs">
                <button onclick="sendMessage()" class="bg-blue-600 text-white px-4 py-2 rounded text-xs">전송</button>
            </div>
        </div>
    </div>

    <script>
        function toggleChat() { document.getElementById('chatWindow').classList.toggle('chat-active'); }

        async function sendMessage() {
            const message = document.getElementById('chatInput').value;
            const name = document.getElementById('userName').value;
            const phone = document.getElementById('userPhone').value;
            const chatContent = document.getElementById('chatContent');

            if (!message) return;

            chatContent.innerHTML += `<div class="text-right"><span class="bg-blue-600 text-white p-2 rounded-lg inline-block">${message}</span></div>`;
            document.getElementById('chatInput').value = '';

            try {
                // 아까 만든 API 경로로 질문 전송
                const response = await fetch('/API/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message, name, phone })
                });
                const data = await response.json();
                chatContent.innerHTML += `<div class="text-left"><span class="bg-white border p-2 rounded-lg inline-block text-gray-800">${data.answer}</span></div>`;
                chatContent.scrollTop = chatContent.scrollHeight;
            } catch (e) {
                chatContent.innerHTML += `<div class="text-center text-red-500 text-xs">연결 오류가 발생했습니다.</div>`;
            }
        }
    </script>
</body>
</html>
