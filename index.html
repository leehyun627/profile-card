<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>이현 | 종합보험설계사 | 세이프가드 프로</title>

    <meta property="og:title" content="이현 | 종합보험설계사 | 세이프가드 프로" />
    <meta property="og:description" content="당신의 보상을 지키는 방패. 가입부터 분쟁 대응까지 전문가가 밀착 관리합니다." />
    <meta property="og:image" content="https://i.postimg.cc/0jJGBpML/peulopil.jpg" />
    <meta property="og:url" content="https://profile-card-gamma-livid.vercel.app/" />
    <meta property="og:type" content="website" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="이현 | 종합보험설계사" />
    <meta name="twitter:description" content="세이프가드 프로 대표 이현입니다." />
    <meta name="twitter:image" content="https://i.postimg.cc/0jJGBpML/peulopil.jpg" />

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; -webkit-font-smoothing: antialiased; }
        .animate-fadeIn { animation: fadeIn 0.5s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-gray-100 text-slate-900">
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [activeTab, setActiveTab] = useState('experience');
            
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [activeTab]);

            const profile = {
                name: "이현", 
                title: "종합보험설계사",
                slogan: "당신의 보상을 지키는 방패 : 세이프가드 프로",
                photoUrl: "https://i.postimg.cc/0jJGBpML/peulopil.jpg",
                experience: [
                    { title: "메타리치 맵그룹 압도 종합보험설계사", period: "2026.01 - 현재" },
                    { title: "종합보험 자문센터 세이프가드 프로 대표설계사", period: "2026.02 - 현재" }
                ],
                certificates: ["손해보험", "생명보험", "변액보험", "제3보험"],
                activities: [
                    { name: "실제 분쟁사례 분석 리포트", link: "https://m.blog.naver.com/safeguard_pro" },
                    { name: "나의 활동 증명 창구 (포트폴리오)", link: "https://www.instagram.com/m.a.p_lee_pro?igsh=eWlna2F6bjNuZGc4&utm_source=qr" }
                ]
            };

            return (
                <div className="max-w-md mx-auto bg-white min-h-screen pb-16 shadow-2xl relative overflow-hidden rounded-t-3xl border-t border-gray-100">
                    {/* 상단 프로필 영역 (다크 모드 유지) */}
                    <div className="bg-slate-950 text-white p-10 rounded-b-[3.5rem] text-center shadow-xl relative z-10">
                        <div className="w-28 h-28 mx-auto mb-5 border-4 border-white rounded-full overflow-hidden shadow-2xl bg-white flex items-center justify-center">
                            <img 
                                src={profile.photoUrl} 
                                alt={`${profile.name} 설계사 프로필`}
                                className="w-full h-full object-cover object-center scale-105"
                                onError={(e) => { e.target.src = 'https://via.placeholder.com/150?text=Profile'; }}
                            />
                        </div>
                        <h1 className="text-2xl font-black tracking-tight">{profile.name}</h1>
                        <p className="text-blue-400 font-bold mt-1.5 text-base">{profile.title}</p>
                        <p className="text-sm text-gray-400 mt-5 leading-relaxed px-2 font-medium italic">"{profile.slogan}"</p>
                        
                        {/* 상담하기 버튼 */}
                        <div className="mt-10 flex justify-center">
                            <a href="https://open.kakao.com/o/sLOsfuei" target="_blank" className="inline-block group">
                                <button className="bg-white text-slate-900 px-10 py-3.5 rounded-full font-black shadow-2xl flex items-center gap-2.5 active:scale-95 transition-all group-hover:bg-blue-50 hover:shadow-lg">
                                    <i data-lucide="message-circle" class="w-5 h-5 text-blue-600"></i> 실시간 상담하기
                                </button>
                            </a>
                        </div>
                    </div>

                    {/* 탭 메뉴 */}
                    <div className="flex justify-around mt-10 px-6 border-b border-gray-100 bg-white">
                        {[
                            { id: 'experience', label: '경력/자격', icon: 'award' },
                            { id: 'activity', label: '활동증명', icon: 'book-open' },
                            { id: 'intro', label: '소개글', icon: 'user' }
                        ].map((tab) => (
                            <button
                                key={tab.id}
                                onClick={() => setActiveTab(tab.id)}
                                className={`flex flex-col items-center pb-4 px-3 gap-1.5 transition-all relative ${
                                    activeTab === tab.id ? 'text-slate-950 font-black' : 'text-gray-400 hover:text-slate-600'
                                }`}
                            >
                                <i data-lucide={tab.icon} class="w-5 h-5"></i>
                                <span className="text-xs tracking-tight">{tab.label}</span>
                                {activeTab === tab.id && (
                                    <div className="absolute bottom-0 left-0 right-0 h-1 bg-slate-950 rounded-t-full animate-fadeIn"></div>
                                )}
                            </button>
                        ))}
                    </div>

                    {/* 콘텐츠 영역 */}
                    <div className="p-8 animate-fadeIn bg-white">
                        {activeTab === 'experience' && (
                            <div className="space-y-8">
                                <div>
                                    <h3 className="text-xs font-black text-gray-400 mb-5 uppercase tracking-widest flex items-center gap-2"><i data-lucide="briefcase" class="w-4 h-4"></i> Experience</h3>
                                    {profile.experience.map((exp, i) => (
                                        <div key={i} className="bg-gray-50 p-6 rounded-2xl mb-5 border border-gray-100 shadow-inner group hover:border-blue-200 transition-colors">
                                            <h4 className="font-bold text-slate-800 text-base group-hover:text-blue-700">{exp.title}</h4>
                                            <p className="text-xs text-gray-500 mt-2.5 font-normal tracking-tight bg-white inline-block px-2.5 py-1 rounded-full border border-gray-100">{exp.period}</p>
                                        </div>
                                    ))}
                                </div>
                                <div>
                                    <h3 className="text-xs font-black text-gray-400 mb-5 uppercase tracking-widest flex items-center gap-2"><i data-lucide="shield-check" class="w-4 h-4"></i> Licenses</h3>
                                    <div className="flex flex-wrap gap-2.5">
                                        {profile.certificates.map((cert, i) => (
                                            <span key={i} className="bg-blue-50 text-blue-700 px-4 py-2.5 rounded-xl text-xs font-bold border border-blue-100 shadow-sm hover:scale-105 transition-transform">{cert}</span>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}
                        {activeTab === 'activity' && (
                            <div className="space-y-5">
                                <h3 className="text-xs font-black text-gray-400 mb-5 uppercase tracking-widest flex items-center gap-2"><i data-lucide="layers" class="w-4 h-4"></i> Activities</h3>
                                {profile.activities.map((act, i) => (
                                    <a href={act.link} key={i} target="_blank" className="flex items-center justify-between bg-white p-6 rounded-2xl shadow-sm border border-gray-100 active:bg-gray-50 hover:border-blue-300 transition-all hover:shadow-md group">
                                        <span className="font-bold text-slate-700 group-hover:text-blue-700">{act.name}</span>
                                        <i data-lucide="external-link" class="w-5 h-5 text-blue-500 group-hover:translate-x-1 transition-transform"></i>
                                    </a>
                                ))}
                            </div>
                        )}
                        {activeTab === 'intro' && (
                            <div className="bg-slate-50 p-9 rounded-3xl text-slate-700 leading-relaxed shadow-inner border border-gray-100">
                                <p className="mb-6 font-medium text-lg text-slate-900 leading-tight">안녕하세요,<br/><span className="font-extrabold text-blue-800">세이프가드 프로</span> 대표 <span className="font-extrabold text-black">이현</span>입니다.</p>
                                
                                <p className="mb-4 text-base text-slate-800">종합보험 설계와 손해사정 관점을 동시에 이해하는 전문가로서, 가입부터 분쟁 대응까지 전 과정을 밀착 관리합니다.</p>
                                <p className="text-blue-800 font-bold italic text-base">"저의 세이프가드 프로가 365일 24시간 언제 어디서든 고객의 보상을 지키는 단단한 방패가 되어 드리겠습니다."</p>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
