<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>이현 | 디지털 명함</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-gray-100 font-sans">
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [activeTab, setActiveTab] = useState('experience');
            
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [activeTab]);

            const profile = {
                name: "이현", 
                title: "비즈니스 및 보험 법률 전문가",
                slogan: "판례와 법령을 근거로 당신의 전문성을 증명합니다.",
                experience: [
                    { title: "대법원 판례 기반 분쟁 조정 전문가", period: "2022 - 현재" },
                    { title: "보험약관 및 상법 분석 자문", period: "2020 - 2022" }
                ],
                certificates: ["손해사정사", "보험약관 분석사", "법률 전문 자격"],
                activities: [
                    { name: "금융감독원 분쟁사례 분석 리포트", link: "#" },
                    { name: "나의 활동 증명 창구 (포트폴리오)", link: "#" }
                ]
            };

            return (
                <div className="max-w-md mx-auto bg-white min-h-screen pb-10 shadow-2xl">
                    <div className="bg-slate-900 text-white p-10 rounded-b-[3rem] text-center shadow-lg">
                        <div className="w-24 h-24 bg-slate-700 rounded-full mx-auto mb-4 border-4 border-white flex items-center justify-center">
                            <i data-lucide="user" class="w-12 h-12 text-white"></i>
                        </div>
                        <h1 className="text-2xl font-bold">{profile.name}</h1>
                        <p className="text-blue-400 font-medium mt-1">{profile.title}</p>
                        <p className="text-sm text-gray-400 mt-4 leading-relaxed px-4 italic">"{profile.slogan}"</p>
                        <div className="mt-8">
                            <a href="본인의_카카오톡_링크_주소" target="_blank">
    <button className="bg-white text-slate-900 ...">
        <i data-lucide="message-circle" class="w-5 h-5"></i> 실시간 상담하기
    </button>
</a>
                            px-8 py-3 rounded-full font-bold shadow-xl flex items-center gap-2 mx-auto active:scale-95 transition">
                                <i data-lucide="message-circle" class="w-5 h-5"></i> 실시간 상담하기
                            </button>
                        </div>
                    </div>

                    <div className="flex justify-around mt-8 px-4 border-b">
                        {[
                            { id: 'experience', label: '경력/자격', icon: 'award' },
                            { id: 'activity', label: '활동증명', icon: 'book-open' },
                            { id: 'intro', label: '소개글', icon: 'user' }
                        ].map((tab) => (
                            <button
                                key={tab.id}
                                onClick={() => setActiveTab(tab.id)}
                                className={`flex flex-col items-center pb-3 px-2 gap-1 transition ${
                                    activeTab === tab.id ? 'border-b-4 border-slate-900 text-slate-900 font-bold' : 'text-gray-400'
                                }`}
                            >
                                <i data-lucide={tab.icon} class="w-5 h-5"></i>
                                <span className="text-xs">{tab.label}</span>
                            </button>
                        ))}
                    </div>

                    <div className="p-6">
                        {activeTab === 'experience' && (
                            <div className="space-y-6">
                                <div>
                                    <h3 className="text-xs font-black text-gray-400 mb-4 uppercase tracking-widest">Experience</h3>
                                    {profile.experience.map((exp, i) => (
                                        <div key={i} className="bg-gray-50 p-5 rounded-2xl mb-4 border border-gray-100 font-bold">
                                            {exp.title}
                                            <p className="text-xs text-gray-500 mt-2 font-normal">{exp.period}</p>
                                        </div>
                                    ))}
                                </div>
                                <div>
                                    <h3 className="text-xs font-black text-gray-400 mb-4 uppercase tracking-widest">Licenses</h3>
                                    <div className="flex flex-wrap gap-2">
                                        {profile.certificates.map((cert, i) => (
                                            <span key={i} className="bg-blue-50 text-blue-600 px-4 py-2 rounded-xl text-xs font-bold">{cert}</span>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}
                        {activeTab === 'activity' && (
                            <div className="space-y-4">
                                {profile.activities.map((act, i) => (
                                    <a href={act.link} key={i} className="flex items-center justify-between bg-white p-5 rounded-2xl shadow-sm border border-gray-100 active:bg-gray-50">
                                        <span className="font-bold text-slate-700">{act.name}</span>
                                        <i data-lucide="external-link" class="w-5 h-5 text-blue-500"></i>
                                    </a>
                                ))}
                            </div>
                        )}
                        {activeTab === 'intro' && (
                            <div className="bg-slate-50 p-8 rounded-3xl text-slate-700 leading-relaxed shadow-inner">
                                <p className="mb-4 font-bold text-xl text-slate-900 leading-snug underline decoration-blue-500 underline-offset-8">안녕하세요,<br/>전문가 {profile.name}입니다.</p>
                                <p>보험약관 및 실제 대법원 판례를 근거로 고객님의 권익을 철저히 분석하고 보호합니다.</p>
                                <p className="mt-4 font-medium italic">"실력은 결과로 증명하겠습니다."</p>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
