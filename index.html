<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>이현 | 세이프가드 프로 | 대표 보험설계사</title>

    <meta property="og:title" content="이현 | 세이프가드 프로 | 대표 보험설계사" />
    <meta property="og:description" content="당신의 보상을 지키는 방패 : 세이프가드 프로" />
    <meta property="og:image" content="https://i.postimg.cc/0jJGBpML/peulopil.jpg" />
    <meta property="og:url" content="https://profile-card-gamma-livid.vercel.app/" />
    <meta property="og:type" content="website" />

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; -webkit-font-smoothing: antialiased; background-color: #f3f4f6; color: #1a1a1a; }
        .animate-fadeIn { animation: fadeIn 0.4s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .chat-slide-up { animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        input { font-size: 16px !important; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const App = () => {
            const [activeTab, setActiveTab] = useState('experience');
            const [isChatOpen, setIsChatOpen] = useState(false);
            const [messages, setMessages] = useState([
                { role: 'assistant', content: '안녕하세요! 설계사 이현을 대신해 상담을 돕는 AI입니다. 성함과 연락처를 남겨주시면 더 정확한 상담이 가능합니다.' }
            ]);
            const [userInput, setUserInput] = useState('');
            const [userName, setUserName] = useState('');
            const [userPhone, setUserPhone] = useState('');
            const chatEndRef = useRef(null);

            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [activeTab, isChatOpen]);
            useEffect(() => { chatEndRef.current?.scrollIntoView({ behavior: "smooth" }); }, [messages]);

            const profile = {
                name: "이현",
                title: "종합보험설계사",
                slogan: "당신의 보상을 지키는 방패 : 세이프가드 프로",
                photoUrl: "https://i.postimg.cc/0jJGBpML/peulopil.jpg",
                experience: [
                    { title: "메타리치 맵그룹 압도 종합보험설계사", period: "2026.01 - 현재" },
                    { title: "세이프가드 프로 | 종합보험 컨설팅 대표설계사", period: "2026.02 - 현재" }
                ],
                certificates: ["손해보험", "생명보험", "변액보험", "제3보험"],
                activities: [
                    { name: "세이프가드 프로 블로그", link: "https://m.blog.naver.com/safeguard_pro" },
                    { name: "세이프가드 프로 인스타그램", link: "https://www.instagram.com/m.a.p_lee_pro?igsh=eWlna2F6bjNuZGc4&utm_source=qr" }
                ]
            };

            const sendMessage = async () => {
                if (!userInput.trim()) return;
                const newMessages = [...messages, { role: 'user', content: userInput }];
                setMessages(newMessages);
                setUserInput('');

                try {
                    const response = await fetch('/api/chat', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ message: userInput, name: userName, phone: userPhone })
                    });
                    const data = await response.json();
                    setMessages([...newMessages, { role: 'assistant', content: data.answer }]);
                } catch (e) {
                    setMessages([...newMessages, { role: 'assistant', content: '연결 오류가 발생했습니다. 잠시 후 다시 시도해 주세요.' }]);
                }
            };

            return (
                <div className="max-w-md mx-auto bg-white min-h-screen pb-16 shadow-2xl relative overflow-hidden rounded-t-3xl border-t border-gray-100">
                    <div className="bg-slate-950 text-white p-10 rounded-b-[3.5rem] text-center shadow-xl relative z-10">
                        <div className="w-28 h-28 mx-auto mb-5 border-4 border-white rounded-full overflow-hidden shadow-2xl bg-white flex items-center justify-center">
                            <img src={profile.photoUrl} alt="프로필" className="w-full h-full object-cover scale-105" />
                        </div>
                        <h1 className="text-2xl font-black">{profile.name}</h1>
                        <p className="text-blue-400 font-bold mt-1.5">{profile.title}</p>
                        <p className="text-sm text-gray-400 mt-5 italic">"{profile.slogan}"</p>
                        <div className="mt-10 flex flex-col gap-3 items-center">
                            <button onClick={() => setIsChatOpen(true)} className="w-full max-w-[240px] bg-blue-600 text-white px-6 py-3.5 rounded-full font-black shadow-xl inline-flex items-center justify-center gap-2 active:scale-95 transition-all">
                                <i data-lucide="bot" className="w-5 h-5"></i> 실시간 AI 상담하기
                            </button>
                            <a href="https://open.kakao.com/o/sLOsfuei" target="_blank" className="w-full max-w-[240px] bg-white text-slate-900 px-6 py-3.5 rounded-full font-black shadow-lg inline-flex items-center justify-center gap-2 active:scale-95 border border-gray-100">
                                <i data-lucide="message-circle" className="w-5 h-5 text-yellow-500"></i> 오픈카톡 직통연결
                            </a>
                        </div>
                    </div>

                    <div className="flex justify-around mt-10 px-6 border-b border-gray-100 bg-white">
                        {['experience', 'activity', 'intro'].map((id) => (
                            <button key={id} onClick={() => setActiveTab(id)} className={`flex flex-col items-center pb-4 px-3 gap-1.5 relative ${activeTab === id ? 'text-slate-950 font-black' : 'text-gray-400'}`}>
                                <i data-lucide={id === 'experience' ? 'award' : id === 'activity' ? 'book-open' : 'user'} className="w-5 h-5"></i>
                                <span className="text-xs">{id === 'experience' ? '경력/자격' : id === 'activity' ? '활동증명' : '소개글'}</span>
                                {activeTab === id && <div className="absolute bottom-0 left-0 right-0 h-1 bg-slate-950 rounded-t-full"></div>}
                            </button>
                        ))}
                    </div>

                    <div className="p-8 animate-fadeIn bg-white">
                        {activeTab === 'experience' && (
                            <div className="space-y-6">
                                <div>
                                    <h3 className="text-xs font-black text-gray-400 mb-4 tracking-widest uppercase">Experience</h3>
                                    {profile.experience.map((exp, i) => (
                                        <div key={i} className="bg-gray-50 p-5 rounded-2xl mb-4 border border-gray-100">
                                            <h4 className="font-bold text-slate-800">{exp.title}</h4>
                                            <p className="text-xs text-gray-500 mt-2">{exp.period}</p>
                                        </div>
                                    ))}
                                </div>
                                <div>
                                    <h3 className="text-xs font-black text-gray-400 mb-4 tracking-widest uppercase">Licenses</h3>
                                    <div className="flex flex-wrap gap-2">
                                        {profile.certificates.map((cert, i) => (
                                            <span key={i} className="bg-blue-50 text-blue-700 px-3 py-2 rounded-xl text-xs font-bold border border-blue-100">{cert}</span>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}
                        {activeTab === 'activity' && (
                            <div className="space-y-4">
                                {profile.activities.map((act, i) => (
                                    <a href={act.link} key={i} target="_blank" className="flex items-center justify-between bg-white p-5 rounded-2xl shadow-sm border border-gray-100 active:bg-gray-50 group">
                                        <span className="font-bold text-slate-700 group-hover:text-blue-700">{act.name}</span>
                                        <i data-lucide="external-link" className="w-4 h-4 text-blue-500"></i>
                                    </a>
                                ))}
                            </div>
                        )}
                        {activeTab === 'intro' && (
                            <div className="bg-slate-50 p-8 rounded-3xl text-slate-700 leading-relaxed border border-gray-100">
                                <p className="mb-6 text-lg text-slate-900">안녕하세요,<br/><span className="font-extrabold text-blue-800">세이프가드 프로</span> 대표 <span className="font-extrabold text-black">이현</span>입니다.</p>
                                <p className="mb-4 text-base">종합보험 설계와 손해사정 관점을 동시에 이해하는 전문가로서, 가입부터 보상 분쟁 대응까지 전 과정을 밀착 관리합니다.</p>
                                <p className="text-blue-800 font-bold italic">"고객님의 보상을 지키는 단단한 방패가 되어 드리겠습니다."</p>
                            </div>
                        )}
                    </div>

                    {isChatOpen && (
                        <div className="fixed inset-0 z-[100] flex justify-center items-end bg-black/60 backdrop-blur-sm">
                            <div className="w-full max-w-md bg-white h-[92vh] rounded-t-[2.5rem] shadow-2xl flex flex-col chat-slide-up overflow-hidden">
                                <div className="p-6 flex justify-between items-center bg-slate-950 text-white">
                                    <div className="flex items-center gap-3">
                                        <div className="w-10 h-10 rounded-full border-2 border-blue-500 overflow-hidden bg-white">
                                            <img src={profile.photoUrl} className="w-full h-full object-cover" />
                                        </div>
                                        <div>
                                            <p className="font-bold text-sm">이현 대표설계사 AI</p>
                                            <p className="text-[10px] text-blue-400">실시간 상담 중</p>
                                        </div>
                                    </div>
                                    <button onClick={() => setIsChatOpen(false)} className="p-2 hover:bg-slate-800 rounded-full transition-colors">
                                        <i data-lucide="x" className="w-6 h-6"></i>
                                    </button>
                                </div>

                                <div className="flex-1 overflow-y-auto p-6 bg-gray-50 space-y-4">
                                    <div className="bg-yellow-50 border border-yellow-100 p-4 rounded-2xl text-center shadow-sm">
                                        <p className="text-[11px] text-yellow-800 mb-2 font-medium">직접 연결이 필요하시면 아래 버튼을 눌러주세요</p>
                                        <a href="https://open.kakao.com/o/sLOsfuei" target="_blank" className="bg-[#FAE100] text-[#3C1E1E] px-4 py-2 rounded-lg text-xs font-black inline-flex items-center gap-1">
                                            카카오톡 1:1 상담연결
                                        </a>
                                    </div>
                                    {messages.map((msg, i) => (
                                        <div key={i} className={`flex ${msg.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                                            <div className={`max-w-[85%] p-4 rounded-2xl text-sm shadow-sm ${msg.role === 'user' ? 'bg-blue-600 text-white rounded-tr-none' : 'bg-white text-slate-800 rounded-tl-none border border-gray-100'}`}>
                                                {msg.content}
                                            </div>
                                        </div>
                                    ))}
                                    <div ref={chatEndRef} />
                                </div>

                                <div className="p-6 bg-white border-t space-y-3 pb-10">
                                    <div className="flex gap-2">
                                        <input value={userName} onChange={(e) => setUserName(e.target.value)} type="text" placeholder="성함" className="w-1/3 p-3 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:ring-2 focus:ring-blue-500 outline-none" />
                                        <input value={userPhone} onChange={(e) => setUserPhone(e.target.value)} type="tel" placeholder="연락처" className="flex-1 p-3 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:ring-2 focus:ring-blue-500 outline-none" />
                                    </div>
                                    <div className="flex gap-2">
                                        <input value={userInput} onChange={(e) => setUserInput(e.target.value)} onKeyPress={(e) => e.key === 'Enter' && sendMessage()} type="text" placeholder="궁금하신 내용을 입력하세요..." className="flex-1 p-3 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:ring-2 focus:ring-blue-500 outline-none" />
                                        <button onClick={sendMessage} className="bg-blue-600 text-white p-3 rounded-xl shadow-lg active:scale-95 transition-all">
                                            <i data-lucide="send" className="w-5 h-5"></i>
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
